services:
  eEXUI:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: eEXUI_app
    # hostname: yourhostname <- optional
    volumes:
      - $PWD/db/:/etc/ex-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      eEXUI_ENABLE_FAIL2BAN: "true"
    tty: true
    network_mode: host
    restart: unless-stopped
